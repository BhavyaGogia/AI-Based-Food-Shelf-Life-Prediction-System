<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starfield Close</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    #scene {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      z-index: 1;
      pointer-events: none;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.143.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.143.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <canvas id="scene"></canvas>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { GammaCorrectionShader } from 'three/addons/shaders/GammaCorrectionShader.js';
    import { CopyShader } from 'three/addons/shaders/CopyShader.js';

    // 1. PALETTES & CONFIG
    const PALETTES = {
      dark: {
        bgColor: '#0a0a24',
        flameColor: '#aee9ff',
        flameColor2: '#c79bff',
        flameAmt: 0.2,
        colorA: '#aef6cf',
        colorB: '#5fe6a0',
        colorC: '#eafff2',
        opacity: 2.0,
        brightness: 1.85
      },
      light: {
        bgColor: '#f4fbf7',
        flameColor: '#bbf7d0',
        flameColor2: '#86efac',
        flameAmt: 0.25,
        colorA: '#059669',
        colorB: '#047857',
        colorC: '#065f46',
        opacity: 1.5,
        brightness: 1.2
      }
    };

    const CONFIG = {
      pointSize: 50,
      drift: 2.35,
      twinkle: 1,
      spin: 0.03,
      repelRadius: 5,
      repelStrength: 0.35,
      scrollPush: 8,
      scrollDrift: 6,
      scrollSpin: 0.1,
      parallax: 0.6,
    };

    // 2. LAYERS
    const LAYERS = {
      NONE: 0,
      TORUS_SCENE: 1,
      BLOOM_SCENE: 2,
      ENTIRE_SCENE: 3
    };

    // Helper: Hex to Vector3
    function hexToVec3(hex) {
      const n = parseInt(hex.slice(1), 16);
      return new THREE.Vector3(
        ((n >> 16) & 255) / 255,
        ((n >> 8) & 255) / 255,
        (n & 255) / 255
      );
    }

    // Determine initial mode from query param or prefers-color-scheme
    const urlParams = new URLSearchParams(window.location.search);
    let currentMode = urlParams.get('mode') || 
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    if (!PALETTES[currentMode]) currentMode = 'dark';

    // State for smooth transition
    const activePalette = {
      bgColor: hexToVec3(PALETTES[currentMode].bgColor),
      flameColor: hexToVec3(PALETTES[currentMode].flameColor),
      flameColor2: hexToVec3(PALETTES[currentMode].flameColor2),
      flameAmt: PALETTES[currentMode].flameAmt,
      colorA: hexToVec3(PALETTES[currentMode].colorA),
      colorB: hexToVec3(PALETTES[currentMode].colorB),
      colorC: hexToVec3(PALETTES[currentMode].colorC),
      opacity: PALETTES[currentMode].opacity,
      brightness: PALETTES[currentMode].brightness
    };

    // 3. Boilerplate Setup
    const canvas = document.getElementById('scene');
    const renderer = new THREE.WebGL1Renderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.VSMShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.Fog(0x000000, 0, 15);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 80);
    camera.position.set(0, 0, 5);
    camera.layers.enable(LAYERS.TORUS_SCENE);
    camera.layers.enable(LAYERS.BLOOM_SCENE);
    camera.layers.enable(LAYERS.ENTIRE_SCENE);
    scene.add(camera);

    // 4. Geometry
    const count = 4200;
    const depth = 30;
    const geometry = new THREE.BufferGeometry();

    const positions = new Float32Array(count * 3);
    const palette = new Float32Array(count);
    const bright = new Float32Array(count);
    const scales = new Float32Array(count);
    const phases = new Float32Array(count);

    for (let i = 0; i < count; i++) {
      const i3 = i * 3;
      positions[i3]     = (Math.random() - 0.5) * 24;
      positions[i3 + 1] = (Math.random() - 0.5) * 16;
      positions[i3 + 2] = (Math.random() - 0.5) * 30;

      palette[i] = Math.floor(Math.random() * 3);
      bright[i]  = 0.7 + Math.random() * 0.6;
      scales[i]  = 0.5 + Math.pow(Math.random(), 1.4) * 2.5;
      phases[i]  = Math.random();
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('aScale', new THREE.BufferAttribute(scales, 1));
    geometry.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
    geometry.setAttribute('aPalette', new THREE.BufferAttribute(palette, 1));
    geometry.setAttribute('aBright', new THREE.BufferAttribute(bright, 1));

    // 5. Material & Shaders
    const uniforms = {
      uTime: { value: 0 },
      uSize: { value: CONFIG.pointSize },
      uOpacity: { value: 0 },
      uDrift: { value: 0 },
      uDepth: { value: depth },
      uTwinkle: { value: CONFIG.twinkle },
      uCursor: { value: new THREE.Vector3() },
      uRepelRadius: { value: CONFIG.repelRadius },
      uRepelStrength: { value: CONFIG.repelStrength },
      uActivity: { value: 0 },
      uColorA: { value: activePalette.colorA },
      uColorB: { value: activePalette.colorB },
      uColorC: { value: activePalette.colorC },
      uBrightness: { value: activePalette.brightness }
    };

    const vertexShader = `
      uniform float uTime; uniform float uSize; uniform float uDrift; uniform float uDepth; uniform float uTwinkle;
      uniform vec3 uCursor; uniform float uRepelRadius; uniform float uRepelStrength; uniform float uActivity;
      uniform vec3 uColorA; uniform vec3 uColorB; uniform vec3 uColorC;
      attribute float aScale; attribute float aPhase; attribute float aPalette; attribute float aBright;
      varying vec3 vColor; varying float vTwinkle;
      void main() {
        vec3 pos = position;
        // Endless drift toward +Z with mod-wrap.
        pos.z = mod(pos.z + uDrift + (uDepth * 0.5), uDepth) - (uDepth * 0.5);

        float tw = sin(uTime * 1.6 + aPhase * 6.2831);
        vTwinkle = (1.0 - uTwinkle) + uTwinkle * (0.55 + 0.45 * tw);

        vec4 modelPosition = modelMatrix * vec4(pos, 1.0);

        vec3 toParticle = modelPosition.xyz - uCursor;
        float dist = length(toParticle);
        float falloff = smoothstep(uRepelRadius, 0.0, dist);
        modelPosition.xyz += normalize(toParticle + vec3(0.0001)) * falloff * uRepelStrength * uActivity;

        vec4 viewPosition = viewMatrix * modelPosition;
        gl_Position = projectionMatrix * viewPosition;
        gl_PointSize = uSize * aScale;
        gl_PointSize *= (1.0 / -viewPosition.z);

        vec3 base = aPalette < 0.5 ? uColorA : (aPalette < 1.5 ? uColorB : uColorC);
        vColor = base * aBright;
      }
    `;

    const fragmentShader = `
      uniform float uOpacity; uniform float uBrightness;
      varying vec3 vColor; varying float vTwinkle;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        if (d > 0.5) discard;
        float strength = pow(1.0 - d * 2.0, 4.0);
        vec3 color = mix(vec3(0.0), vColor, strength);
        gl_FragColor = vec4(color * uBrightness, strength * uOpacity * vTwinkle);
      }
    `;

    const material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    const points = new THREE.Points(geometry, material);
    points.layers.enable(LAYERS.ENTIRE_SCENE);

    const group = new THREE.Group();
    group.add(points);
    scene.add(group);

    // 6. Postprocessing
    const renderScene = new RenderPass(scene, camera);

    // torusComposer
    const torusComposer = new EffectComposer(renderer);
    torusComposer.renderToScreen = false;
    torusComposer.addPass(renderScene);
    torusComposer.addPass(new ShaderPass(GammaCorrectionShader));
    torusComposer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.22, 0.2, 0));
    torusComposer.addPass(new ShaderPass(CopyShader));

    // bloomComposer
    const bloomComposer = new EffectComposer(renderer);
    bloomComposer.renderToScreen = false;
    bloomComposer.addPass(renderScene);
    bloomComposer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.4, 0.55, 0));
    bloomComposer.addPass(new ShaderPass(GammaCorrectionShader));

    // FinalPass
    const FinalShader = {
      uniforms: {
        iTime: { value: 0 },
        tDiffuse: { value: null },
        torusTexture: { value: null },
        bloomTexture: { value: null },
        haloTexture: { value: null },
        uBg: { value: activePalette.bgColor },
        uFlameA: { value: activePalette.flameColor },
        uFlameB: { value: activePalette.flameColor2 },
        uFlameAmt: { value: activePalette.flameAmt }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float iTime;
        uniform sampler2D tDiffuse;
        uniform sampler2D bloomTexture;
        uniform sampler2D torusTexture;
        uniform sampler2D haloTexture;
        uniform vec3 uBg;
        uniform vec3 uFlameA;
        uniform vec3 uFlameB;
        uniform float uFlameAmt;
        varying vec2 vUv;

        vec3 warp3d(vec3 pos, float t) {
          float curv = 0.8, a = 1.9, b = 0.7;
          pos *= 2.0;
          pos.x += curv * sin(t + a * pos.y) + t * b;
          pos.y += curv * cos(t + a * pos.x);
          pos.y += curv * sin(t + a * pos.z) + t * b;
          pos.z += curv * cos(t + a * pos.y);
          pos.z += curv * sin(t + a * pos.x) + t * b;
          pos.x += curv * cos(t + a * pos.z);
          return 0.5 + 0.5 * cos(pos.xyz + vec3(1.0, 2.0, 4.0));
        }

        void main() {
          vec2 uv = 2.0 * vUv - 1.0;
          vec3 w = pow(warp3d(vec3(uv.x, sin(uv.y), uv.y), iTime * 1.5), vec3(1.5));
          vec3 flame = 1.5 * uFlameA * w.x;
          flame *= w.y;
          flame += uFlameB * w.z;
          flame *= smoothstep(0.25, 1.0, abs(uv.y));
          float md = smoothstep(-0.7, 1.0, -uv.y * uv.x);
          flame *= md * md;
          vec3 bg = uBg * (1.0 - 0.4 * length(uv));
          vec3 halo = texture2D(haloTexture, vUv).xyz;
          
          vec3 diffuseColor = texture2D(tDiffuse, vUv).xyz;
          vec3 bloomColor = texture2D(bloomTexture, vUv).xyz;
          vec3 torusColor = texture2D(torusTexture, vUv).xyz;

          gl_FragColor = vec4(bg + flame * uFlameAmt + bloomColor + torusColor + diffuseColor + halo, 1.0);
        }
      `
    };

    const finalPass = new ShaderPass(FinalShader);
    const finalComposer = new EffectComposer(renderer);
    finalComposer.addPass(renderScene);
    finalComposer.addPass(finalPass);

    finalPass.uniforms.bloomTexture.value = bloomComposer.renderTarget1.texture;
    finalPass.uniforms.torusTexture.value = torusComposer.renderTarget1.texture;

    const dummyTex = new THREE.DataTexture(new Uint8Array([0,0,0,0]), 1, 1, THREE.RGBAFormat);
    dummyTex.needsUpdate = true;
    finalPass.uniforms.haloTexture.value = dummyTex;

    // 7. Interaction state
    const POINTER = {
      ndc: new THREE.Vector2(),
      world: new THREE.Vector3(),
      active: false,
      lastMove: 0,
      activity: 0
    };

    const mouseSmooth = new THREE.Vector2();
    let scrollTarget = 0;
    let scrollSmooth = 0;
    let scrollCurrent = 0;

    // Listen to parent postMessage events
    window.addEventListener('message', (event) => {
      if (event.data && typeof event.data === 'object') {
        if (event.data.type === 'setMode' && PALETTES[event.data.mode]) {
          currentMode = event.data.mode;
        }
        if (event.data.type === 'setScroll') {
          scrollTarget = THREE.MathUtils.clamp(event.data.scroll, 0, 1);
        }
        if (event.data.type === 'setPointer') {
          POINTER.ndc.x = event.data.x;
          POINTER.ndc.y = event.data.y;
          POINTER.active = true;
          POINTER.lastMove = performance.now() / 1000;
        }
        if (event.data.type === 'pointerLeave') {
          POINTER.active = false;
        }
      }
    });

    // Also support local mousemove if embedding doesn't forward it
    window.addEventListener('mousemove', (e) => {
      POINTER.ndc.x = (e.clientX / window.innerWidth) * 2 - 1;
      POINTER.ndc.y = -(e.clientY / window.innerHeight) * 2 + 1;
      POINTER.active = true;
      POINTER.lastMove = performance.now() / 1000;
    });

    window.addEventListener('mouseleave', () => {
      POINTER.active = false;
    });

    window.addEventListener('scroll', () => {
      const scrollHeight = document.documentElement.scrollHeight;
      const innerHeight = window.innerHeight;
      scrollTarget = THREE.MathUtils.clamp(window.scrollY / (scrollHeight - innerHeight), 0, 1);
    });

    const raycaster = new THREE.Raycaster();
    const planeZ = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

    function updatePointer() {
      if (POINTER.active) {
        raycaster.setFromCamera(POINTER.ndc, camera);
        const target = new THREE.Vector3();
        if (raycaster.ray.intersectPlane(planeZ, target)) {
          POINTER.world.lerp(target, 0.12);
        }
      } else {
        POINTER.world.lerp(new THREE.Vector3(0, 0, 0), 0.12);
      }

      const now = performance.now() / 1000;
      const idle = now - POINTER.lastMove;
      const want = (POINTER.active && idle < 3) ? 1 : 0;
      POINTER.activity += (want - POINTER.activity) * 0.06;

      material.uniforms.uCursor.value.copy(POINTER.world);
      material.uniforms.uActivity.value = POINTER.activity;
    }

    // 8. Render & Animation Loop
    let t0 = performance.now() / 1000;
    const appearStart = performance.now();

    function animate() {
      requestAnimationFrame(animate);

      const now = performance.now() / 1000;
      const dt = Math.min(0.05, now - t0);
      t0 = now;

      // Color interpolation (lerp) for mode transitions
      const targetPalette = PALETTES[currentMode];
      const lerpSpeed = 0.05; // smooth transition speed

      activePalette.bgColor.lerp(hexToVec3(targetPalette.bgColor), lerpSpeed);
      activePalette.flameColor.lerp(hexToVec3(targetPalette.flameColor), lerpSpeed);
      activePalette.flameColor2.lerp(hexToVec3(targetPalette.flameColor2), lerpSpeed);
      activePalette.colorA.lerp(hexToVec3(targetPalette.colorA), lerpSpeed);
      activePalette.colorB.lerp(hexToVec3(targetPalette.colorB), lerpSpeed);
      activePalette.colorC.lerp(hexToVec3(targetPalette.colorC), lerpSpeed);
      activePalette.flameAmt += (targetPalette.flameAmt - activePalette.flameAmt) * lerpSpeed;
      activePalette.brightness += (targetPalette.brightness - activePalette.brightness) * lerpSpeed;
      activePalette.opacity += (targetPalette.opacity - activePalette.opacity) * lerpSpeed;

      // Update shader/material uniforms
      material.uniforms.uColorA.value.copy(activePalette.colorA);
      material.uniforms.uColorB.value.copy(activePalette.colorB);
      material.uniforms.uColorC.value.copy(activePalette.colorC);
      material.uniforms.uBrightness.value = activePalette.brightness;

      // Update postprocessing shader uniforms
      finalPass.uniforms.uBg.value.copy(activePalette.bgColor);
      finalPass.uniforms.uFlameA.value.copy(activePalette.flameColor);
      finalPass.uniforms.uFlameB.value.copy(activePalette.flameColor2);
      finalPass.uniforms.uFlameAmt.value = activePalette.flameAmt;

      // Scroll/Mouse damping
      scrollSmooth = THREE.MathUtils.lerp(scrollSmooth, scrollTarget, 0.10);
      scrollCurrent = THREE.MathUtils.lerp(scrollCurrent, scrollSmooth, 0.06);

      mouseSmooth.x = THREE.MathUtils.lerp(mouseSmooth.x, POINTER.active ? POINTER.ndc.x : 0, 0.06);
      mouseSmooth.y = THREE.MathUtils.lerp(mouseSmooth.y, POINTER.active ? POINTER.ndc.y : 0, 0.06);

      // Uniform updates
      material.uniforms.uTime.value = now;
      material.uniforms.uDrift.value += dt * (CONFIG.drift + scrollCurrent * CONFIG.scrollDrift);

      // Appear fade
      const elapsed = performance.now() - appearStart;
      const fade = THREE.MathUtils.clamp((elapsed - 300) / 1400, 0, 1);
      material.uniforms.uOpacity.value = fade * activePalette.opacity;

      // Camera position
      camera.position.set(mouseSmooth.x * CONFIG.parallax, mouseSmooth.y * CONFIG.parallax, 5 - scrollCurrent * CONFIG.scrollPush);
      camera.lookAt(mouseSmooth.x * CONFIG.parallax, mouseSmooth.y * CONFIG.parallax, -10);

      // Group rotation
      group.rotation.z += dt * (CONFIG.spin + scrollCurrent * CONFIG.scrollSpin);

      // Update pointer intersection
      updatePointer();

      // Composers rendering
      finalPass.uniforms.iTime.value = now;

      camera.layers.set(LAYERS.TORUS_SCENE);
      torusComposer.render();

      camera.layers.set(LAYERS.BLOOM_SCENE);
      bloomComposer.render();

      camera.layers.set(LAYERS.ENTIRE_SCENE);
      finalComposer.render();
    }

    // 9. Resize Handling
    window.addEventListener('resize', () => {
      const width = window.innerWidth;
      const height = window.innerHeight;

      camera.aspect = width / height;
      camera.updateProjectionMatrix();

      renderer.setSize(width, height, false);
      torusComposer.setSize(width, height);
      bloomComposer.setSize(width, height);
      finalComposer.setSize(width, height);
    });

    animate();
  </script>
</body>
</html>
